name: Update Market Data Daily

on:
  schedule:
    # Run Monday-Friday at 9:30 AM IST (4:00 AM UTC)
    - cron: '0 4 * * 1-5'
  workflow_dispatch:  # Manual trigger button

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests beautifulsoup4
      
      - name: Create data directory
        run: mkdir -p data generated_data
      
      - name: Run updater script
        run: python nifty500_auto_updater.py
      
      - name: Commit and push updated data
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || \
          (git commit -m "Auto-update market data $(date +'%Y-%m-%d %H:%M')" && git push)
