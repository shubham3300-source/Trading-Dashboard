name: Auto Update Market Data

on:
  schedule:
    - cron: '*/10 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}  # ✅ Secret use कर रहे हैं
          persist-credentials: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests beautifulsoup4 lxml

      - name: 📁 Create directories
        run: mkdir -p data generated_data

      - name: 🔄 Run updater
        continue-on-error: true
        run: |
          if [ -f "nifty500_auto_updater_simple.py" ]; then
            python nifty500_auto_updater_simple.py
          fi

      - name: ✅ Verify and commit
        run: |
          # Configure git
          git config user.name 'Market Data Bot'
          git config user.email 'bot@github-actions.com'
          
          # Show current status
          ls -lh data/
          
          # Add file
          git add -f data/nifty500_live_latest.csv
          
          # Commit if changes
          if ! git diff --staged --quiet; then
            TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')
            git commit -m "📊 Auto-update: $TIMESTAMP"
            git push
            echo "✅ Data updated and pushed!"
          else
            echo "ℹ️ No changes"
          fi
