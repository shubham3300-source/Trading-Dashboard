name: Auto Update Market Data

on:
  schedule:
    - cron: '*/10 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests beautifulsoup4 lxml ta

      - name: 📁 Create directories
        run: mkdir -p data generated_data

      - name: 🔄 Run main updater
        id: updater
        continue-on-error: true
        run: |
          echo "Running nifty500_auto_updater.py..."
          python nifty500_auto_updater.py
          
          # Check if file was created
          if [ -f "data/nifty500_live_latest.csv" ]; then
            echo "✅ Data file created successfully"
            ls -lh data/nifty500_live_latest.csv
            echo "file_created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Data file not created"
            echo "file_created=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 🆘 Create fallback if updater failed
        if: steps.updater.outputs.file_created != 'true'
        run: |
          echo "Creating fallback data..."
          python -c "
import pandas as pd
import os

os.makedirs('data', exist_ok=True)

# Minimal fallback data
data = {
    'symbol': ['RELIANCE', 'TCS', 'INFY', 'HDFCBANK', 'ICICIBANK'],
    'company_name': ['Reliance', 'TCS', 'Infosys', 'HDFC Bank', 'ICICI Bank'],
    'sector': ['Energy', 'IT', 'IT', 'Banking', 'Banking'],
    'close': [2450, 3650, 1520, 1650, 1020],
    'change_pct': [1.5, 0.8, -0.5, 1.2, 0.3],
    'volume_ratio': [1.8, 1.2, 0.9, 1.5, 1.1],
    'combined_score': [75, 82, 68, 79, 71],
    'technical_score': [70, 85, 65, 75, 68],
    'value_score': [80, 78, 72, 83, 75],
    'signal': ['Breakout', 'Uptrend', 'Neutral', 'Near Breakout', 'Uptrend']
}

df = pd.DataFrame(data)
df.to_csv('data/nifty500_live_latest.csv', index=False)
print('✓ Fallback data created')
"
          ls -lh data/nifty500_live_latest.csv

      - name: 📤 Commit and push changes
        run: |
          git config user.name 'Market Data Bot'
          git config user.email 'bot@github-actions.com'
          
          # Show what we have
          echo "📊 Data file status:"
          ls -lh data/nifty500_live_latest.csv
          echo ""
          echo "First 5 lines:"
          head -5 data/nifty500_live_latest.csv
          
          # Add file
          git add -f data/nifty500_live_latest.csv
          
          # Also add constituents if exists
          if [ -f "data/nifty500_constituents.csv" ]; then
            git add -f data/nifty500_constituents.csv
          fi
          
          # Commit if changes
          if ! git diff --staged --quiet; then
            TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')
            git commit -m "📊 Auto-update: $TIMESTAMP"
            git push
            echo "✅ Changes pushed successfully!"
          else
            echo "ℹ️ No changes to commit"
          fi
